name = "sunnahskills"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# Local development defaults
# database_id = "DB" ensures that `wrangler d1 execute --local` hashes the string "DB"
# to the same SQLite file as `wrangler pages dev --local` (which hashes the binding name "DB").
# Both use Miniflare's durableObjectNamespaceIdFromName("miniflare-D1DatabaseObject", "DB") = e7352547...
[[d1_databases]]
binding = "DB"
database_name = "DB"
database_id = "DB"

[vars]
SITE_URL = "http://localhost:8788"
EMAIL_FROM = "noreply@sunnahskills.pages.dev"
EMAIL_TO = "mysunnahskill@gmail.com"

# ─── Production environment (main branch → sunnahskills-admin-v3) ─────────────
[[env.production.d1_databases]]
binding = "DB"
database_name = "sunnahskills-admin-v3"
database_id = "69bf03d8-908e-410b-b3cf-5dfb13676679"

[env.production.vars]
SITE_URL = "https://sunnahskills.com"
EMAIL_FROM = "admin@sunnahskills.com"
EMAIL_TO = "mysunnahskill@gmail.com"

# ─── Preview environment (prototype branch → sunnahskills-admin-v2) ───────────
[[env.preview.d1_databases]]
binding = "DB"
database_name = "sunnahskills-admin-v2"
database_id = "fc0a958f-4bfe-487f-845f-bce49d4715d5"

[env.preview.vars]
SITE_URL = "https://prototype.sunnahskills.pages.dev"
EMAIL_FROM = "noreply@sunnahskills.pages.dev"
EMAIL_TO = "mysunnahskill@gmail.com"
