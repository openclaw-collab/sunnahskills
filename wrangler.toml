name = "sunnahskills"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# Local development defaults
# database_id = "DB" ensures that `wrangler d1 execute --local` hashes the string "DB"
# to the same SQLite file as `wrangler pages dev --local` (which hashes the binding name "DB").
# Both use Miniflare's durableObjectNamespaceIdFromName("miniflare-D1DatabaseObject", "DB") = e7352547...
[[d1_databases]]
binding = "DB"
database_name = "DB"
database_id = "DB"

[[r2_buckets]]
binding = "STUDIO_UPLOADS"
bucket_name = "sunnahskills-studio-uploads"

[vars]
SITE_URL = "http://localhost:8788"
EMAIL_FROM = "noreply@sunnahskills.pages.dev"
EMAIL_TO = "mysunnahskill@gmail.com"

# ─── Production environment (main branch → sunnahskills-admin) ────────────────
[[env.production.d1_databases]]
binding = "DB"
database_name = "sunnahskills-admin"
database_id = "f337006b-a41a-42de-80ae-d9f9b98ec0e3"

[[env.production.r2_buckets]]
binding = "STUDIO_UPLOADS"
bucket_name = "sunnahskills-studio-uploads"

[env.production.vars]
SITE_URL = "https://sunnahskills.com"
EMAIL_FROM = "noreply@sunnahskills.com"
EMAIL_TO = "mysunnahskill@gmail.com"

# ─── Preview environment (prototype branch → sunnahskills-admin-v2) ───────────
[[env.preview.d1_databases]]
binding = "DB"
database_name = "sunnahskills-admin-v2"
database_id = "fc0a958f-4bfe-487f-845f-bce49d4715d5"

[[env.preview.r2_buckets]]
binding = "STUDIO_UPLOADS"
bucket_name = "sunnahskills-studio-uploads"

[env.preview.vars]
SITE_URL = "https://prototype.sunnahskills.pages.dev"
EMAIL_FROM = "noreply@sunnahskills.pages.dev"
EMAIL_TO = "mysunnahskill@gmail.com"

# ─── Test environment (local Miniflare SQLite, no Cloudflare) ─────────────────
[[env.test.d1_databases]]
binding = "DB"
database_name = "sunnahskills-test"
database_id = "local-test-db"

[[env.test.r2_buckets]]
binding = "STUDIO_UPLOADS"
bucket_name = "sunnahskills-studio-uploads-test"

[env.test.vars]
SITE_URL = "http://localhost:8789"
EMAIL_FROM = "noreply@test.local"
EMAIL_TO = "test@test.local"