name = "sunnahskills"
compatibility_date = "2024-01-01"

[build]
command = "npm run build"

pages_build_output_dir = "dist"

# Functions configuration for Cloudflare Pages
[functions]
directory = "functions"

# D1 Database configuration
[[d1_databases]]
binding = "DB"
database_name = "sunnahskills-db"
database_id = "your-database-id-here" # You'll get this from Cloudflare dashboard 