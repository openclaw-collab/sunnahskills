name: CI

on:
  push:
    branches: [main, prototype]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc -p tsconfig.json --noEmit

      - name: Unit tests (Vitest)
        run: npx vitest run --config vitest.config.ts
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build

      - name: Pages Functions bundle check
        run: npx wrangler pages functions build functions --project-directory . --outdir .wrangler/pages-ci-check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
